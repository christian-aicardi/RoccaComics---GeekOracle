<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geek Oracle — Indovina il Film!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#08001a;--card:#100025;--border:#2d1060;--acc:#00f5ff;--acc2:#ff00aa;--gold:#ffc93c;--text:#e0d4ff;--muted:#5a4a7a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.wrap{position:relative;z-index:1;width:100%;max-width:620px;padding:14px 14px 60px;}
header{text-align:center;padding:20px 0 14px;}
.logo{font-family:'Press Start 2P',monospace;font-size:1rem;color:var(--acc);text-shadow:0 0 16px var(--acc);line-height:1.7;margin-bottom:6px;}
.subtitle{font-size:.58rem;letter-spacing:4px;color:var(--muted);}
.credit{font-size:.48rem;letter-spacing:3px;color:#1a0830;margin-top:3px;}
.screen{display:none;}.screen.active{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 16px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);}
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.hud-pts{font-family:'Press Start 2P',monospace;font-size:.9rem;color:var(--gold);}
.hud-lives{font-size:.9rem;}
.hud-n{font-family:'Press Start 2P',monospace;font-size:.6rem;color:var(--muted);}
.prog-outer{background:#0d0020;height:4px;border-radius:2px;margin-bottom:16px;overflow:hidden;}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .5s ease;border-radius:2px;}
.clue-box{background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.14);border-radius:10px;padding:14px;margin-bottom:12px;}
.clue-lbl{font-size:.52rem;letter-spacing:3px;color:var(--acc);margin-bottom:7px;font-family:'Press Start 2P',monospace;}
.clue-txt{font-size:.88rem;line-height:1.75;color:var(--text);}
.clue-yr{font-size:.65rem;color:var(--muted);margin-top:5px;letter-spacing:2px;}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ans-btn{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px 9px;cursor:pointer;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.7rem;text-align:center;transition:all .16s;line-height:1.4;}
.ans-btn:hover:not(:disabled){border-color:var(--acc);background:rgba(0,245,255,0.07);color:var(--acc);}
.ans-btn.correct{border-color:var(--acc)!important;background:rgba(0,245,255,0.15)!important;color:var(--acc)!important;}
.ans-btn.wrong{border-color:var(--acc2)!important;background:rgba(255,0,170,0.1)!important;color:var(--acc2)!important;}
.skip-btn{width:100%;padding:9px;background:transparent;border:1px solid var(--muted);color:var(--muted);font-family:'Exo 2',sans-serif;font-size:.62rem;letter-spacing:2px;cursor:pointer;border-radius:8px;transition:all .2s;margin-bottom:8px;}
.skip-btn:hover{border-color:var(--acc2);color:var(--acc2);}
.feedback{padding:11px;border-radius:10px;font-size:.72rem;margin-bottom:9px;display:none;line-height:1.6;}
.feedback.ok{background:rgba(0,245,255,0.07);border:1px solid rgba(0,245,255,0.22);color:var(--acc);}
.feedback.ko{background:rgba(255,0,170,0.07);border:1px solid rgba(255,0,170,0.22);color:var(--acc2);}
.btn-next{width:100%;padding:12px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Exo 2',sans-serif;font-size:.7rem;letter-spacing:2px;cursor:pointer;border-radius:8px;transition:all .2s;display:none;}
.btn-next:hover{border-color:var(--acc);color:var(--acc);}
.home-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 16px;margin-bottom:12px;}
.home-title{font-family:'Press Start 2P',monospace;font-size:.82rem;color:var(--acc);margin-bottom:14px;line-height:1.8;}
.how{font-size:.78rem;line-height:2;color:#aaa;margin-bottom:16px;}
.how b{color:var(--acc);}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.cat-btn{background:rgba(0,245,255,0.03);border:1px solid var(--border);border-radius:8px;padding:11px;cursor:pointer;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:.68rem;text-align:center;transition:all .2s;}
.cat-btn.active,.cat-btn:hover{border-color:var(--acc);color:var(--acc);background:rgba(0,245,255,0.07);}
.btn-start{width:100%;padding:14px;background:linear-gradient(135deg,#0d00ff20,#00f5ff20);border:1px solid var(--acc);color:var(--acc);font-family:'Press Start 2P',monospace;font-size:.72rem;cursor:pointer;border-radius:8px;letter-spacing:2px;transition:all .2s;}
.btn-start:hover{background:rgba(0,245,255,0.14);box-shadow:0 0 24px rgba(0,245,255,0.25);}
.end-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 16px;text-align:center;margin-bottom:12px;}
.end-big{font-family:'Press Start 2P',monospace;font-size:2.4rem;color:var(--gold);text-shadow:0 0 24px var(--gold);margin-bottom:6px;}
.end-lbl{font-size:.52rem;letter-spacing:3px;color:var(--muted);margin-bottom:12px;}
.end-msg{font-size:.8rem;color:#aaa;line-height:1.8;margin-bottom:14px;}
.disc-ttl{font-size:.52rem;letter-spacing:2px;color:var(--acc);margin-bottom:8px;text-align:left;}
.disc-item{background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.12);border-radius:8px;padding:9px 11px;margin-bottom:6px;text-align:left;}
.disc-name{font-size:.72rem;color:var(--acc);font-weight:600;margin-bottom:2px;}
.disc-desc{font-size:.65rem;color:#777;line-height:1.5;}
.btn-again{width:100%;padding:12px;background:transparent;border:1px solid var(--acc);color:var(--acc);font-family:'Press Start 2P',monospace;font-size:.58rem;cursor:pointer;border-radius:8px;margin-bottom:8px;letter-spacing:1px;}
.btn-home{width:100%;padding:10px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Exo 2',sans-serif;font-size:.68rem;letter-spacing:2px;cursor:pointer;border-radius:8px;}
.fade-in{animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.streak-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Press Start 2P',monospace;font-size:1.1rem;color:var(--gold);z-index:100;pointer-events:none;text-shadow:0 0 16px var(--gold);transition:transform .3s,opacity .4s;white-space:nowrap;}
.streak-pop.show{transform:translate(-50%,-50%) scale(1);}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <header>
    <div class="logo">INDOVINA<br>IL FILM!</div>
    <div class="subtitle">Quiz di cinema fantastico</div>
    <div class="credit">Centro Video Taroni</div>
  </header>

  <div class="screen active" id="s-home">
    <div class="home-card fade-in">
      <div class="home-title">COME SI GIOCA</div>
      <div class="how">Ti mostro una <b>descrizione misteriosa</b> e l'anno.<br>Scegli il titolo giusto tra 4 opzioni.<br>Più è raro il titolo, <b>più punti guadagni!</b></div>
      <div style="font-size:.6rem;letter-spacing:2px;color:var(--muted);margin-bottom:9px;">CATEGORIA</div>
      <div class="cat-grid">
        <button class="cat-btn active" onclick="selCat(this,'all')">🌌 Tutto</button>
        <button class="cat-btn" onclick="selCat(this,'comics')">🦸 Comics</button>
        <button class="cat-btn" onclick="selCat(this,'vg')">🎮 Videogioco</button>
        <button class="cat-btn" onclick="selCat(this,'saghe')">🎬 Saghe</button>
      </div>
      <button class="btn-start" onclick="startGame()">▶ START GAME</button>
    </div>
  </div>

  <div class="screen" id="s-quiz">
    <div class="card">
      <div class="hud">
        <div><div style="font-size:.48rem;letter-spacing:2px;color:var(--muted)">PUNTI</div><div class="hud-pts" id="h-pts">000</div></div>
        <div style="text-align:center"><div style="font-size:.48rem;letter-spacing:2px;color:var(--muted)">VITE</div><div class="hud-lives" id="h-lives">❤️❤️❤️</div></div>
        <div style="text-align:right"><div style="font-size:.48rem;letter-spacing:2px;color:var(--muted)">DOMANDA</div><div class="hud-n" id="h-num">1/8</div></div>
      </div>
      <div class="prog-outer"><div class="prog-inner" id="prog" style="width:0%"></div></div>
      <div class="clue-box">
        <div class="clue-lbl">🔍 INDIZIO</div>
        <div class="clue-txt" id="clue-txt"></div>
        <div class="clue-yr" id="clue-yr"></div>
      </div>
      <div class="ans-grid" id="ans-grid"></div>
      <button class="skip-btn" id="skip-btn" onclick="skipQ()">⏭ SALTA (−1 vita)</button>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQ()">AVANTI →</button>
    </div>
  </div>

  <div class="screen" id="s-end">
    <div class="end-card fade-in">
      <div class="end-lbl">PUNTEGGIO FINALE</div>
      <div class="end-big" id="end-pts">0</div>
      <div class="end-lbl" id="end-sub"></div>
      <div class="end-msg" id="end-msg"></div>
      <div class="disc-ttl" id="disc-head"></div>
      <div id="disc-list"></div>
      <button class="btn-again" onclick="startGame()">▶ GIOCA ANCORA</button>
      <button class="btn-home" onclick="goHome()">← CAMBIA CATEGORIA</button>
    </div>
  </div>
</div>
<div class="streak-pop" id="streak-pop"></div>

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let selCat_='all', qQueue=[], curIdx=0, score=0, lives=3, discovered=[], streak=0, wrongList=[];

function selCat(btn,cat){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selCat_=cat;}

function getFiltered(){
  if(selCat_==='all') return ALL_QS;
  return ALL_QS.filter(q=>q.cat===selCat_);
}

// Anti-ripetizione: shuffla tutto e scorre senza ripetere finché non finisce il giro
let globalQueue=[], globalIdx=0;
function nextQuestion(){
  const pool=getFiltered();
  if(globalIdx>=globalQueue.length||globalQueue[0]?.cat!==selCat_){
    globalQueue=shuffle(pool); globalIdx=0;
  }
  // Se abbiamo finito tutti, ricomicia dall'inizio con nuova shuffle
  if(globalIdx>=globalQueue.length){globalQueue=shuffle(pool);globalIdx=0;}
  return globalQueue[globalIdx++];
}

function buildSession(){
  const pool=getFiltered();
  globalQueue=shuffle(pool); globalIdx=0;
  const qs=[];
  const n=Math.min(8,pool.length);
  const usedIdx=new Set();
  // Prendo 8 domande senza ripetere nella sessione
  for(let i=0;i<pool.length&&qs.length<n;i++){
    if(!usedIdx.has(i)){usedIdx.add(i);qs.push(pool[i]);}
  }
  return shuffle(qs);
}

function startGame(){
  const pool=getFiltered();
  const n=Math.min(8,pool.length);
  // Shuffle globale anti-ripetizione
  if(globalQueue.length===0||selCat_!==lastCat){globalQueue=shuffle(pool);globalIdx=0;lastCat=selCat_;}
  const session=[];
  const tmpIdx=globalIdx;
  for(let i=0;i<n;i++){
    if(globalIdx>=globalQueue.length){globalQueue=shuffle(pool);globalIdx=0;}
    session.push(globalQueue[globalIdx++]);
  }
  // Se ho consumato tutto il pool, resetto per la prossima partita
  if(globalIdx>=globalQueue.length){globalQueue=shuffle(pool);globalIdx=0;}
  
  qQueue=session; curIdx=0; score=0; lives=3; discovered=[]; streak=0; wrongList=[];
  showScr('s-quiz'); renderQ();
}

let lastCat='all';

function renderQ(){
  const q=qQueue[curIdx];
  document.getElementById('h-pts').textContent=String(score).padStart(3,'0');
  document.getElementById('h-num').textContent=(curIdx+1)+'/'+qQueue.length;
  document.getElementById('prog').style.width=(curIdx/qQueue.length*100)+'%';
  document.getElementById('h-lives').textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(3-Math.max(0,lives));
  document.getElementById('clue-txt').textContent=q.desc;
  document.getElementById('clue-yr').textContent='📅 Anno: '+q.year+(q.pts>=20?' — ⭐ Titolo raro (+'+q.pts+' pt)':'');
  const grid=document.getElementById('ans-grid'); grid.innerHTML='';
  const opts=shuffle([q.title,...q.decoys.slice(0,3)]);
  opts.forEach(opt=>{
    const b=document.createElement('button'); b.className='ans-btn'; b.textContent=opt;
    b.onclick=()=>pick(opt,q,b); grid.appendChild(b);
  });
  document.getElementById('skip-btn').style.display='block';
  document.getElementById('feedback').style.display='none';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('skip-btn').disabled=false;
}

function pick(chosen,q,btn){
  document.querySelectorAll('.ans-btn').forEach(b=>{b.disabled=true;if(b.textContent===q.title)b.classList.add('correct');});
  const ok=chosen===q.title;
  document.getElementById('skip-btn').style.display='none';
  const fb=document.getElementById('feedback'); fb.style.display='block';
  if(ok){
    score+=q.pts; streak++;
    btn.classList.add('correct');
    fb.className='feedback ok';
    fb.innerHTML='✅ ESATTO! +'+q.pts+' punti!'+(q.pts>=20?' 🌟 Titolo raro!':'')+(streak>=3?' 🔥 Streak x'+streak+'!':'');
    if(q.pts>=18) discovered.push(q);
    if(streak>=3)showStreak();
  } else {
    lives--; streak=0; btn.classList.add('wrong');
    fb.className='feedback ko';
    fb.innerHTML='❌ Sbagliato! Era <strong>'+q.title+'</strong>'+(q.pts>=18?'<br>Titolo raro — chiedilo allo stand!':'');
    if(q.pts>=18) discovered.push(q);
    if(!wrongList.find(x=>x.title===q.title)) wrongList.push(q);
  }
  document.getElementById('h-pts').textContent=String(score).padStart(3,'0');
  document.getElementById('h-lives').textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(3-Math.max(0,lives));
  document.getElementById('btn-next').style.display='block';
  const bn=document.getElementById('btn-next');
  if(lives<=0||curIdx>=qQueue.length-1){bn.textContent='FINE →';bn.onclick=showEnd;}
  else{bn.textContent='AVANTI →';bn.onclick=nextQ;}
}

function skipQ(){
  const q=qQueue[curIdx]; lives--; streak=0;
  document.querySelectorAll('.ans-btn').forEach(b=>{b.disabled=true;if(b.textContent===q.title)b.classList.add('correct');});
  document.getElementById('skip-btn').style.display='none';
  const fb=document.getElementById('feedback'); fb.style.display='block'; fb.className='feedback ko';
  fb.innerHTML='⏭ Saltato! Era <strong>'+q.title+'</strong>';
  if(q.pts>=18) discovered.push(q);
  if(!wrongList.find(x=>x.title===q.title)) wrongList.push(q);
  document.getElementById('h-lives').textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(3-Math.max(0,lives));
  document.getElementById('btn-next').style.display='block';
  const bn=document.getElementById('btn-next');
  if(lives<=0||curIdx>=qQueue.length-1){bn.textContent='FINE →';bn.onclick=showEnd;}
  else{bn.textContent='AVANTI →';bn.onclick=nextQ;}
}

function nextQ(){curIdx++;if(curIdx>=qQueue.length||lives<=0){showEnd();return;}renderQ();}

function showStreak(){
  const el=document.getElementById('streak-pop');
  el.textContent='🔥 COMBO x'+streak+'!'; el.classList.add('show');
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>{el.classList.remove('show');el.style.opacity='1';},500);},1200);
}

function showEnd(){
  showScr('s-end');
  document.getElementById('end-pts').textContent=String(score).padStart(3,'0');
  document.getElementById('end-sub').textContent='Vite rimaste: '+'❤️'.repeat(Math.max(0,lives));
  const msg=score>=120?'🏆 Enciclopedista del cinema fantastico!':score>=70?'⭐ Grande conoscitore!':score>=30?'📽️ Buone basi — esplora ancora!':'🎬 Vieni a Centro Video Taroni!';
  document.getElementById('end-msg').textContent=msg;
  const dl=document.getElementById('disc-list'); dl.innerHTML='';
  const dh=document.getElementById('disc-head');
  if(wrongList.length>0){
    dh.textContent='🎬 '+wrongList.length+' FILM CHE HAI SBAGLIATO — SCOPRI DI PIÙ';
    buildWrongCards2(wrongList);
  } else {dh.textContent='Perfetto! Hai risposto correttamente a tutto.';}
}

const canvas=document.getElementById('bg');const ctx=canvas.getContext('2d');let W,H,g2=[];
function resize2(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;g2=[];for(let x=0;x<W;x+=40)for(let y=0;y<H;y+=40)g2.push({x,y,t:Math.random()*Math.PI*2,s:0.01+Math.random()*.02});}
function draw2(){ctx.clearRect(0,0,W,H);g2.forEach(p=>{p.t+=p.s;const a=0.02+0.05*Math.abs(Math.sin(p.t));ctx.fillStyle='rgba(0,245,255,'+a+')';ctx.fillRect(p.x,p.y,1,1);});requestAnimationFrame(draw2);}
window.addEventListener('resize',resize2);resize2();draw2();

  "Avengers Endgame": {desc:"I supereroi sopravvissuti compiono un viaggio nel tempo per recuperare le Gemme dell'Infinito e sconfiggere Thanos.", cur:"La frase 'Avengers Assemble' era stata tenuta segreta per 11 anni. La premiere mondiale ha battuto tutti i record."},
  "Dredd - il giudice dell'apocalisse": {desc:"Il giudice Dredd e la recluta Anderson vengono intrappolati in un grattacielo di 200 piani controllato dalla boss Ma-Ma.", cur:"Girato quasi interamente in un grattacielo reale in Sudafrica. Karl Urban non toglie mai il casco — fedele al fumetto."},
  "Shazam": {desc:"Billy Batson, un ragazzo in affido, scopre di potersi trasformare in un adulto superpotente pronunciando la parola Shazam.", cur:"Zachary Levi ha dovuto indossare un costume imbottito perché fisicamente non sembrava abbastanza 'supereroistico'."},
  "Hellboy (2018)": {desc:"Hellboy affronta Nimue la Regina del Sangue, una strega millenaria che vuole sterminare l'umanità con una piaga demoniaca.", cur:"David Harbour ha passato 5 ore ogni giorno al trucco per diventare Hellboy. Il film è vietato ai minori."},
  "Captain Marvel": {desc:"Vers, una guerriera Kree, arriva sulla Terra negli anni '90 e scopre di essere in realtà Carol Danvers, un'ex pilota dell'aeronautica.", cur:"Brie Larson si è allenata per 9 mesi. Nel film appare una giovane versione di Nick Fury con due occhi."},
  "Aquaman": {desc:"Arthur Curry deve rivendicare il trono di Atlantide e sconfiggere suo fratellastro Orm che vuole dichiarare guerra alla terraferma.", cur:"James Wan ha creato un linguaggio sottomarino completamente nuovo. Il film ha incassato oltre 1 miliardo di dollari."},
  "Venom": {desc:"Il giornalista Eddie Brock entra in contatto con un simbionte alieno che si fonde con lui creando l'anti-eroe Venom.", cur:"Tom Hardy ha improvvisato molte scene. Ha dichiarato che il 40% del suo materiale migliore fu tagliato dal montaggio."},
  "Ant-man and the wasp": {desc:"Scott Lang e Hope van Dyne lavorano insieme per recuperare Janet van Dyne dal Regno Quantistico prima che sia troppo tardi.", cur:"Il film è il primo MCU con una donna nel titolo. La scena post-credits è collegata direttamente ad Avengers Infinity War."},
  "Deadpool 2": {desc:"Deadpool forma la X-Force per proteggere un giovane mutante da Cable, un guerriero dal futuro venuto per ucciderlo.", cur:"La scena con Brad Pitt dura meno di 2 secondi. Ryan Reynolds ha pagato il suo cameo di tasca propria come scherzo."},
  "Avengers infinity war": {desc:"Thanos raccoglie le sei Gemme dell'Infinito per sterminare metà della vita nell'universo con uno schiocco di dita.", cur:"Lo schiocco finale era un segreto assoluto. Molti attori non sapevano cosa sarebbe successo fino alla prima del film."},
  "Il ragazzo invisibile - seconda generazione": {desc:"Michele, ora adolescente, scopre che ci sono altri ragazzi con superpoteri in Italia e deve fare i conti con il suo passato.", cur:"Il sequel ha un budget più alto e un tono più cupo rispetto al primo. Gabriele Salvatores firma anche questo capitolo."},
  "Black panther": {desc:"T'Challa torna a Wakanda per assumere il trono ma deve affrontare Killmonger, un rivale con diritti al trono tanto quanto lui.", cur:"Chadwick Boseman ha interpretato il ruolo mentre combatteva segretamente contro il cancro. Una delle performance più commoventi."},
  "Thor ragnarok": {desc:"Thor viene intrappolato sul pianeta Sakaar e deve combattere in un'arena contro il campione per tornare ad Asgard in tempo.", cur:"Taika Waititi ha lasciato improvvisare quasi tutto il cast. La battuta 'He's a friend from work' la suggerì un bambino in visita."},
  "Justice league": {desc:"Batman e Wonder Woman reclutano un team di metaumani per proteggere la Terra da Steppenwolf e le sue Scatole Madri.", cur:"Henry Cavill aveva i baffi per un altro film durante le riprese aggiuntive. La Disney ha pagato milioni per rimuoverli digitalmente."},
  "Kingsman il cerchio d'oro": {desc:"Quando il quartier generale dei Kingsman viene distrutto, gli agenti si alleano con i loro omologhi americani Statesman.", cur:"Elton John appare nel film e le sue scene furono improvvisate. Jeff Bridges e Channing Tatum si uniscono al cast."},
  "Spider-man homecoming": {desc:"Peter Parker, ancora studente delle superiori, cerca di dimostrare di meritare un posto negli Avengers mentre affronta l'Avvoltoio.", cur:"Tom Holland seppe di aver ottenuto il ruolo mentre guardava Captain America: Civil War al cinema come spettatore normale."},
  "Wonder woman": {desc:"Diana, principessa delle Amazzoni, lascia la sua isola per combattere nella Prima Guerra Mondiale convinta che Ares stia causando il conflitto.", cur:"Gal Gadot era incinta di 5 mesi durante le riprese della seconda unità. Il corsetto fu modificato con uno speciale pannello verde."},
  "I guardiani della galassia vol. 2": {desc:"Peter Quill scopre chi è suo padre — Ego, un Pianeta Vivente — mentre il team affronta nuovi nemici e vecchie tensioni.", cur:"Cat Stevens fu contattato per usare Father and Son nella colonna sonora ma rifiutò. Yusuf Islam poi accettò."},
  "Logan - the wolverine": {desc:"Un Logan invecchiato e malato si prende cura di un Professor X con demenza mentre protegge una bambina con i suoi stessi poteri.", cur:"Hugh Jackman ha dichiarato che avrebbe fatto altri film solo se la storia fosse stata così buona. È ispirato alla graphic novel Old Man Logan."},
  "Doctor Strange": {desc:"Un brillante neurochirurgo, dopo un incidente che distrugge le sue mani, scopre il mondo della magia e delle arti mistiche.", cur:"Benedict Cumberbatch fu scelto dopo che Joaquin Phoenix rifiutò il ruolo. Il Sanctum Sanctorum è a New York per davvero."},
  "Suicide squad": {desc:"Amanda Waller recluta i peggiori criminali per una missione suicida in cambio di una riduzione della pena.", cur:"Jared Leto mandò regali inquietanti a tutti gli attori per restare nel personaggio del Joker durante le riprese."},
  "X-men apocalisse": {desc:"Il primo mutante della storia, Apocalisse, si risveglia dopo millenni e recluta quattro Cavalieri per distruggere il mondo moderno.", cur:"Oscar Isaac ha trascorso ore nel costume. Ha dichiarato di aver sofferto claustrofobia durante le riprese."},
  "Captain America civil war": {desc:"I supereroi si dividono sulla questione dei Sokovia Accords — regolamentazione governativa — in uno scontro epocale.", cur:"L'aeroporto fu costruito da zero in una ex base aerea. La scena di combattimento è considerata la migliore dell'MCU."},
  "Batman v Superman dawn of justice": {desc:"Batman e Superman si scontrano mentre Lex Luthor orchestra il conflitto e Doomsday emerge come minaccia globale.", cur:"Ben Affleck ha dichiarato che leggere i commenti negativi online fu uno degli errori più grandi della sua vita."},
  "Deadpool": {desc:"Un mercenario dalla lingua sciolta ottiene poteri di rigenerazione attraverso un esperimento brutale e cerca vendetta con ironia.", cur:"Ryan Reynolds aspettò 11 anni per farlo. Il budget era ridottissimo per un cinecomics — solo 58 milioni di dollari."},
  "Fantastic 4 - i fantastici 4 (2015)": {desc:"Quattro giovani scienziati acquisiscono superpoteri dopo un esperimento dimensionale che va terribilmente storto.", cur:"Il regista Josh Trank ha twittato che il film fu rovinato dallo studio. Il tweet fu cancellato ore dopo."},
  "Ant-Man": {desc:"Scott Lang, un ladro con il cuore d'oro, viene reclutato dal professor Hank Pym per indossare il costume che permette di rimpicciolire.", cur:"Edgar Wright sviluppò la sceneggiatura per 8 anni prima di abbandonare il progetto per differenze creative con Marvel."},
  "Avengers age of Ultron": {desc:"Tony Stark crea accidentalmente Ultron, un'IA che decide che l'umanità va eliminata per proteggere la pace.", cur:"James Spader interpretò Ultron completamente in performance capture, presente fisicamente su tutti i set."},
  "Il ragazzo invisibile": {desc:"Michele, un tredicenne di Trieste, scopre di poter diventare invisibile e usa i suoi poteri per affrontare il bullismo e aiutare gli altri.", cur:"Diretto da Gabriele Salvatores (Oscar per Mediterraneo). Primo cinecomics interamente italiano della storia."},
  "Kingsman secret service": {desc:"Un giovane ribelle di strada viene reclutato da un'agenzia di spionaggio di élite e deve affrontare un miliardario pazzo.", cur:"Colin Firth si è allenato per mesi per le scene d'azione. La scena in chiesa è considerata una delle migliori d'azione degli anni 2010."},
  "I guardiani della galassia": {desc:"Un gruppo improbabile di fuorilegge — un umano, un'assassina, un guerriero, un procione e un albero — devono salvare la galassia.", cur:"Vin Diesel ha registrato 'I am Groot' in 15 lingue diverse. Il procione Rocket ha fatto piangere Bradley Cooper registrando alcune scene."},
  "X-men giorni di un futuro passato": {desc:"Wolverine viaggia nel passato per prevenire un evento che porterà alla guerra tra mutanti e umani nel futuro.", cur:"Il film unisce i cast originale e nuovo degli X-Men. Peter Maximoff/Quicksilver è considerato il personaggio migliore del film."},
  "The amazing spider-man 2 - il potere di Electro": {desc:"Peter Parker affronta Electro e il Goblin Verde mentre cerca di capire il misterioso passato dei suoi genitori.", cur:"Andrew Garfield e Emma Stone erano fidanzati nella vita reale durante le riprese. Questo aggiunge autenticità alla loro chimica."},
  "Captain America - the winter soldier": {desc:"Steve Rogers scopre che HYDRA si è infiltrata nello S.H.I.E.L.D. e deve affrontare il Winter Soldier, un killer misterioso.", cur:"I fratelli Russo, registi di film indie, furono scelti a sorpresa. Il film ha rivoluzionato il genere spy-thriller nell'MCU."},
  "300 l'alba di un impero": {desc:"Il generale ateniese Temistocle affronta la flotta persiana guidata dalla spietata ammiraglio Artemisia sulle acque del Mar Egeo.", cur:"Eva Green ha dominato completamente il set. Il regista ha detto che il film è diventato 'il film di Eva Green'."},
  "300": {desc:"Il re Leonida guida 300 guerrieri spartani contro l'esercito immenso del re persiano Serse alle Termopili.", cur:"Quasi tutto il film è stato girato su green screen. Gerard Butler si è allenato per 4 mesi con un regime militare."},
  "I, Frankenstein": {desc:"La creatura di Frankenstein sopravvive fino ai giorni nostri, coinvolta in una guerra secolare tra gargoyle e demoni.", cur:"Aaron Eckhart ha perso 13 kg per il ruolo. La creatura viene chiamata 'Adam' in questo adattamento."},
  "Thor the dark world": {desc:"Thor deve salvare i Nove Regni dagli Elfi Oscuri guidati da Malekith che vogliono usare l'Etere per distruggere tutto.", cur:"È considerato il film MCU meno riuscito dai fan. Anthony Hopkins ha ammesso di essersi annoiato durante le riprese."},
  "Kick-ass 2": {desc:"Dave Lizewski si unisce a un team di supereroi amatoriali mentre Hit-Girl cerca di vivere una vita normale e il Mindy affronta la scuola.", cur:"Jim Carrey rifiutò di promuovere il film dopo la strage di Sandy Hook per le scene violente. Una scelta che fece discutere."},
  "Red 2": {desc:"Frank Moses e la sua squadra di agenti della CIA in pensione vengono coinvolti in una nuova missione internazionale.", cur:"Anthony Hopkins si unisce al cast come villain. Il film fu girato in parte a Parigi, Londra e Mosca."},
  "Wolverine l'immortale": {desc:"Logan si reca in Giappone dove le sue capacità rigenerative vengono temporaneamente soppresse, rendendolo vulnerabile.", cur:"Hugh Jackman ha visitato il Giappone per prepararsi al ruolo. La scena del treno ad alta velocità fu girata davvero in movimento."},
  "The Avengers": {desc:"Iron Man, Thor, Captain America, Hulk, Black Widow e Hawkeye si uniscono per fermare Loki e l'invasione degli Chitauri.", cur:"Joss Whedon ha scritto la sceneggiatura in poche settimane. La battaglia di New York ha richiesto 4 mesi di riprese."},
  "L'uomo d'acciaio": {desc:"Kal-El, ultimo figlio di Krypton cresciuto come Clark Kent nel Kansas, rivela al mondo di essere Superman per proteggere la Terra.", cur:"Henry Cavill fu scelto dopo un lungo casting mondiale. Zack Snyder voleva un Superman più riflessivo e tormentato."},
  "Iron man 3": {desc:"Tony Stark, sofferto di ansia post-traumatica dopo gli eventi di New York, affronta il Mandarino e svela i suoi segreti.", cur:"Il twist del Mandarino ha diviso i fan. Shane Black ha scritto e diretto il film ambientandolo a Natale — sua firma stilistica."},
  "Batman il cavaliere oscuro - il ritorno": {desc:"Bruce Wayne torna come Batman dopo 8 anni di ritiro per affrontare Bane, un terrorista mascherato che vuole distruggere Gotham.", cur:"Tom Hardy ha inventato la voce di Bane durante le prove. Christian Bale si è allenato per mesi con lottatori veri."},
  "The amazing Spider-man": {desc:"Peter Parker scopre la verità sulla morte dei suoi genitori mentre diventa Spider-Man e affronta il Lizard.", cur:"Andrew Garfield fu scelto dopo 1500 audizioni. La storia d'amore con Emma Stone fu quasi completamente improvvisata."},
  "Cowboys & Aliens": {desc:"Un cowboy con la memoria cancellata e un misterioso bracciale deve fermare un'invasione aliena nel Far West.", cur:"Daniel Craig e Harrison Ford insieme — accoppiata insolita. Jon Favreau diresse il film dopo Iron Man."},
  "Captain America - il primo vendicatore": {desc:"Steve Rogers, un gracile ragazzo di Brooklyn, si trasforma in un super soldato per combattere HYDRA durante la Seconda Guerra Mondiale.", cur:"Chris Evans quasi rifiutò il ruolo per paura di essere identificato per sempre con il personaggio. Per fortuna cambiò idea."},
  "Lanterna verde": {desc:"Hal Jordan, un pilota spericolato, viene scelto da un anello alieno per diventare membro del Corpo dei Lanterna Verdi.", cur:"Ryan Reynolds ha ammesso pubblicamente che il film fu un fallimento e ha fatto autocritica. Deadpool fa riferimento a questo."},
  "X-men l'inizio": {desc:"Charles Xavier e Erik Lensherr fondano insieme la prima squadra di X-Men durante la crisi dei missili di Cuba negli anni '60.", cur:"Michael Fassbender e James McAvoy si sono allenati insieme per settimane per costruire la chimica tra i personaggi."},
  "Red": {desc:"Frank Moses, un ex agente della CIA in pensione, viene braccato dai suoi ex colleghi e riunisce il suo vecchio team.", cur:"Bruce Willis, Morgan Freeman, Helen Mirren con un mitragliatore — il film ha reinventato il concetto di film d'azione per adulti."},
  "Thor": {desc:"Il superbo dio del tuono viene esiliato sulla Terra e privato dei suoi poteri mentre suo fratello Loki complotta per il trono.", cur:"Kenneth Branagh, esperto di Shakespeare, fu scelto per le dinamiche familiari shakespeariane tra Thor e Loki."},
  "Kick-ass": {desc:"Un normale adolescente decide di diventare un supereroe senza poteri, con risultati grotteschi, violenti e inaspettati.", cur:"Chloë Grace Moretz aveva 11 anni durante le riprese. I suoi genitori erano sul set ogni giorno per le scene violente."},
  "The green hornet": {desc:"Britt Reid, il figlio di un editore, diventa il vigilante Calabrone Verde insieme al suo partner Kato.", cur:"Seth Rogen ha scritto la sceneggiatura insieme a Evan Goldberg. Jay Chou, star asiatica, interpreta Kato."},
  "Jonah Hex": {desc:"Un cacciatore di taglie sfigurato nel selvaggio West possiede il potere soprannaturale di parlare con i morti per breve tempo.", cur:"Il personaggio di Jonah Hex è uno dei più antichi DC, creato nel 1972 — precede Batman! Josh Brolin nel ruolo."},
  "The losers": {desc:"Un team di operativi della CIA, creduti morti, cercano vendetta contro il misterioso Max che li ha traditi.", cur:"Jeffrey Dean Morgan guida il cast. Il film è basato sulla graphic novel Vertigo/DC di Andy Diggle."},
  "Iron man 2": {desc:"Tony Stark affronta Ivan Vanko, un genio russo con un rancor familiare, e le pressioni del governo per condividere la tecnologia.", cur:"Mickey Rourke ha aggiunto spontaneamente un pappagallo bianco alla scena iniziale. Rimase nel film."},
  "X-men le origini - Wolverine": {desc:"La storia delle origini di Logan: i suoi traumi infantili, il Programma Arma X e la sua relazione con il fratello Sabretooth.", cur:"Il film trapelò online un mese prima dell'uscita in una versione incompleta. L'FBI aprì un'indagine."},
  "The punisher": {desc:"Frank Castle, un agente dell'FBI, sopravvive all'uccisione della sua famiglia e diventa il vigilante spietato noto come Punisher.", cur:"Thomas Jane si è preparato al ruolo vivendo per settimane come senzatetto a Los Angeles per comprendere la violenza urbana."},
  "Watchmen": {desc:"In un'America alternativa anni '80, l'ex vigilante Rorschach indaga sull'omicidio di un collega supereroe in pensione.", cur:"Il graphic novel di Alan Moore è considerato il più grande fumetto di sempre. Moore ha rifiutato tutti i compensi del film."},
  "The spirit": {desc:"Il detective Denny Colt, tornato dalla morte come immortale, protegge la sua città dal criminale noto come l'Octopus.", cur:"Frank Miller ha diretto il film come omaggio a Will Eisner. Girato quasi interamente su green screen come Sin City."},
  "Batman il cavaliere oscuro": {desc:"Batman affronta il Joker, un agente del caos che non vuole denaro né potere — vuole solo vedere il mondo bruciare.", cur:"Heath Ledger vinse l'Oscar postumo. Nolan girò senza CGI — le esplosioni erano reali. Il film ha cambiato il genere."},
  "Iron man": {desc:"Tony Stark, miliardario geniale, costruisce una tuta corazzata dopo essere stato catturato dai terroristi in Afghanistan.", cur:"Robert Downey Jr. fu una scelta controversa. La frase finale 'I am Iron Man' fu improvvisata sul set."},
  "L'incredibile hulk": {desc:"Bruce Banner fugge dal generale Ross mentre cerca una cura per la sua condizione, affrontando l'Abominio a New York.", cur:"Edward Norton ha riscritto la sceneggiatura e ha avuto conflitti con Marvel. Fu sostituito da Mark Ruffalo nei film successivi."},
  "Spider-man 3": {desc:"Peter Parker affronta Sandman, Venom e il nuovo Goblin mentre il simbionte nero corrompe gradualmente il suo carattere.", cur:"Sam Raimi ha dichiarato di non essere soddisfatto del film. La danza di Peter fu un'idea dello studio, non sua."},
  "I fantastici 4 e silver surfer": {desc:"I Fantastici 4 affrontano il Silver Surfer, araldo di Galactus il divoratore di mondi, in una corsa contro il tempo.", cur:"Doug Jones interpretò il Silver Surfer in costume ma la sua voce fu sostituita da quella di Laurence Fishburne in post-produzione."},
  "Ghost rider": {desc:"Johnny Blaze vende l'anima al diavolo per salvare suo padre e diventa il Ghost Rider, cacciatore di demoni per conto di Mefisto.", cur:"Nicolas Cage è un vero fan del personaggio — si è tatuato Ghost Rider sul braccio prima ancora di ottenere il ruolo."},
  "Ghost rider 2 - spirito di vendetta": {desc:"Johnny Blaze è in Europa dove cerca di liberarsi dalla maledizione del Ghost Rider mentre protegge un bambino speciale.", cur:"I registi Neveldine/Taylor hanno usato telecamere GoPro montate su pattini a rotelle per girare le scene d'azione."},
  "X-men conflitto finale": {desc:"La scoperta di una cura per la mutazione divide la comunità dei mutanti mentre Jean Grey si trasforma nella pericolosa Fenice.", cur:"Brett Ratner sostituì Bryan Singer in 3 settimane. Il film uccide personaggi importanti senza preavviso."},
  "Superman (C. Reeve)": {desc:"Kal-El arriva sulla Terra, cresce come Clark Kent nel Kansas e diventa Superman, proteggendo Metropoli da Lex Luthor.", cur:"Christopher Reeve ha fatto credere al mondo che un uomo potesse davvero volare. Si è preparato per 6 mesi con un ex campione olimpico."},
  "Superman 2": {desc:"Tre criminali kryptoniani liberati sfidano Superman mentre lui rinuncia ai suoi poteri per stare con Lois Lane.", cur:"Fu girato in contemporanea con il primo film ma finito anni dopo a causa di problemi produttivi con il regista Richard Donner."},
  "Superman 3": {desc:"Un informatico corrotto usa la tecnologia per creare una forma di kryptonite sintetica che corrompe moralmente Superman.", cur:"Richard Pryor è il protagonista comico del film. Christopher Reeve era scontento della direzione comica presa dalla saga."},
  "Superman 4": {desc:"Superman decide unilateralmente di eliminare tutte le armi nucleari dal mondo mentre affronta Nuclear Man creato da Lex Luthor.", cur:"Fu girato con un budget ridottissimo dopo il flop del terzo. Christopher Reeve ha dichiarato che fu il peggior film della sua carriera."},
  "V per Vendetta": {desc:"In una Gran Bretagna fascista futura, il misterioso V guida una rivoluzione contro il governo totalitario con maschere e teatro.", cur:"La maschera di V è diventata il simbolo mondiale delle proteste. Le Sorelle Wachowski hanno prodotto il film."},
  "Man-thing": {desc:"Una creatura vegetale del pantano si sveglia e inizia a difendere ferocemente la sua palude da sviluppatori corrotti.", cur:"Uno dei film Marvel più rari — distribuito direttamente in TV negli USA. Man-Thing ha ispirato DC a creare Swamp Thing."},
  "I fantastici 4": {desc:"Reed Richards, Sue Storm, Johnny Storm e Ben Grimm acquisiscono superpoteri dopo essere stati colpiti da raggi cosmici nello spazio.", cur:"Una versione del film fu girata nel 1994 dalla Corman Pictures ma non fu mai distribuita ufficialmente — esiste solo in bootleg."},
  "Batman begins": {desc:"Bruce Wayne, dopo anni di addestramento nelle arti marziali, torna a Gotham City e diventa il Cavaliere Oscuro.", cur:"Christopher Nolan ha reinventato completamente il franchise dopo il disastro di Batman & Robin. Christian Bale perse 28 kg per il film precedente."},
  "Sin city": {desc:"Tre storie di crimine intrecciate a Basin City: il detective Hartigan, il criminale Marv e il fotografo Dwight.", cur:"Robert Rodriguez ha girato il film fotogramma per fotogramma replicando il fumetto. Frank Miller ha co-diretto."},
  "Sin city 2": {desc:"Nuove storie di Basin City con il ritorno di personaggi iconici e la storia di Ava Lord, la donna più pericolosa della città.", cur:"Eva Green ha dominato il film con una performance ipnotica. Il sequel uscì 9 anni dopo il primo."},
  "Blade trinity": {desc:"Blade viene incastrato dall'FBI mentre i Vampiri risvegliano Dracula, il primo vampiro, come arma contro il cacciatore.", cur:"Ryan Reynolds è Hannibal King — il suo sarcasmo anticipa perfettamente Deadpool. Wesley Snipes non parlava quasi con nessuno sul set."},
  "Constantine": {desc:"John Constantine, un esorcista che vede demoni e angeli, scopre un complotto per portare il figlio di Satana sulla Terra.", cur:"Keanu Reeves ha studiato demonologia per il ruolo. Il fumetto originale presenta un Constantine biondo e inglese — completamente diverso."},
  "Elektra": {desc:"Elektra Natchios, assassina resuscitata con poteri soprannaturali, deve proteggere un padre e sua figlia da una società segreta.", cur:"Jennifer Garner riprese il ruolo da Daredevil (2003). Il film fu stroncato dalla critica ma ha un piccolo fanbase."},
  "Immortal": {desc:"In una Parigi futuristica del 2095, il dio Horus scende da una piramide volante per trovare un corpo umano.", cur:"Film franco-britannico di Enki Bilal, fumettista di culto. Mix unico di attori reali e CGI, anni prima di Avatar."},
  "Hellboy": {desc:"Hellboy, un demone cresciuto dall'esercito americano, combatte creature soprannaturali insieme all'Ufficio per la Ricerca e la Difesa Paranormale.", cur:"Ron Perlman era l'unica scelta di Guillermo del Toro per il ruolo. Passò ore al trucco ogni mattina per trasformarsi."},
  "Catwoman": {desc:"Patience Phillips, una grafica timida, muore e viene resuscitata da un gatto magico ottenendo i poteri felini di Catwoman.", cur:"Halle Berry ha ritirato il Razzie Award — premio per i peggiori film — di persona, ironizzando su se stessa con eleganza."},
  "Spider-man 2": {desc:"Peter Parker affronta il Dottor Octopus mentre lotta con la sua doppia vita e l'opportunità di abbandonare il costume.", cur:"Considerato uno dei migliori film di supereroi di sempre. La scena del treno è stata girata senza CGI con un modello reale."},
  "X-men 2": {desc:"Gli X-Men devono allearsi con Magneto per fermare il generale Stryker che vuole sterminare tutti i mutanti del mondo.", cur:"La scena iniziale con Nightcrawler alla Casa Bianca rimane una delle migliori sequenze d'azione della saga."},
  "Hulk (2003)": {desc:"Bruce Banner, scienziato traumatizzato dall'infanzia, si trasforma in un gigante verde durante crisi di rabbia.", cur:"Ang Lee ha usato un montaggio stile fumetto unico nel cinema. Il film fu molto più psicologico del previsto."},
  "Blade 2": {desc:"Blade deve allearsi con i vampiri per eliminare i Reapers, una nuova razza di vampire ancora più pericolosi.", cur:"Guillermo del Toro ha diretto il film portando la sua visione horror europea. Considera questo il suo film più puro."},
  "Spider-man": {desc:"Peter Parker, morso da un ragno radioattivo, ottiene superpoteri e diventa Spider-Man mentre affronta il Goblin Verde.", cur:"Sam Raimi voleva che Spider-Man non usasse gadget artificiali — la tela organica fu una sua scelta rivoluzionaria."},
  "La leggenda degli uomini straordinari": {desc:"Allan Quatermain guida un team di eroi letterari vittoriani — Dorian Gray, Nemo, l'Uomo Invisibile — contro una minaccia mondiale.", cur:"Ultimo film di Sean Connery prima del ritiro. Il crossover letterario era rivoluzionario per l'epoca."},
  "Spawn": {desc:"L'agente della CIA Al Simmons viene ucciso e fa un patto con il diavolo per tornare sulla Terra come guerriero dell'inferno.", cur:"Primo film di supereroi con protagonista afroamericano nella storia di Hollywood. John Leguizamo è irriconoscibile come Clown."},
  "The phantom": {desc:"Il Fantasma, eroe mascherato del fumetto anni '30, affronta un magnate che cerca tre teschi soprannaturali.", cur:"Il Fantasma è il primo supereroe in costume attillato della storia (1936!) — precede Superman. Billy Zane si allenò 6 mesi."},
  "Il corvo (B. Lee)": {desc:"Eric Draven, un musicista assassinato, torna dalla morte un anno dopo per vendicarsi dei criminali che hanno ucciso lui e la sua fidanzata.", cur:"Brandon Lee morì accidentalmente sul set. Il film fu completato con CGI e controfigure — un tributo commovente."},
  "Il corvo 2": {desc:"Un nuovo Corvo emerge dalle ceneri per vendicarsi in questa seconda avventura soprannaturale della saga.", cur:"Vincent Perez sostituisce Brandon Lee. Il film mantiene l'estetica gotica ma manca della magia dell'originale."},
  "Il corvo 3": {desc:"Il mito del Corvo continua con una nuova storia di vendetta e redenzione nel terzo capitolo della saga.", cur:"Prodotto con budget ridotto, il film è quasi introvabile oggi. Ha sviluppato un piccolo fanbase cult."},
  "Il corvo (2023)": {desc:"Un reboot moderno del classico cult con Bill Skarsgård come Eric Draven e una storia d'amore e vendetta rivisitata.", cur:"Bill Skarsgård (Pennywise in IT) porta una visione completamente nuova al personaggio. Produzione travagliata durata anni."},
  "X-men": {desc:"I mutanti guidati da Professor X affrontano la Brotherhood di Magneto che vuole trasformare i leader mondiali in mutanti.", cur:"Il film che ha rilanciato il genere supereroistico nel 2000, aprendo la strada a tutti i film Marvel e DC successivi."},
  "Batman & Robin": {desc:"Batman e Robin affrontano Mr. Freeze e Poison Ivy mentre Alfred è gravemente malato e una nuova Batgirl si unisce al team.", cur:"George Clooney ha ammesso pubblicamente di aver rovinato il franchise. I capezzoli sul costume di Batman sono leggendari."},
  "Batman forever": {desc:"Batman affronta l'Enigmista e Due Facce mentre un giovane Dick Grayson chiede di diventare Robin.", cur:"Val Kilmer sostituisce Michael Keaton. Jim Carrey come Enigmista è la performance più memorabile del film."},
  "Batman il ritorno": {desc:"Batman affronta il Pinguino e Catwoman in una Gotham natalizia oscura e surreale.", cur:"Tim Burton ha avuto massima libertà creativa. Il film è molto più oscuro e strano del primo — troppo per la Warner Bros."},
  "Batman (T. Burton)": {desc:"Il Cavaliere Oscuro affronta il Joker che vuole avvelenare Gotham con gas tossici nascosti nei suoi prodotti cosmetici.", cur:"Jack Nicholson chiese e ottenne una percentuale sugli incassi del merchandise. Guadagnò 60 milioni di dollari."},
  "Blade": {desc:"Blade, il mezz'uomo mezz'vampiro, combatte contro la setta dei vampiri guidata da Deacon Frost che vuole evocare il dio del sangue.", cur:"Il film ha salvato i supereroi Marvel al cinema negli anni '90 quando erano considerati non commerciabili."},
  "Dredd (S. Stallone)": {desc:"Il giudice più temuto di Mega-City One viene incastrato per omicidio e deve dimostrare la propria innocenza.", cur:"Stallone ha preteso di togliere il casco al personaggio — nel fumetto Dredd non lo toglie MAI. Rob Schneider è il comic relief."},

  // ===== VIDEOGIOCHI =====
  "Lara Croft: Tomb raider (A. Jolie)": {desc:"La celebre avventuriera e archeologa Lara Croft recupera un manufatto antico che controlla il tempo prima che cada in mani sbagliate.", cur:"Angelina Jolie ha insistito per fare le acrobazie da sola. La casa del padre è quella vera del suo papà Jon Voight."},
  "Lara Croft - Tomb raider la culla della vita": {desc:"Lara Croft cerca la scatola di Pandora prima che un biologo pazzo la usi per scatenare una piaga globale.", cur:"Cradle of Life fu girato in Grecia, Kenya, Hong Kong e Inghilterra. Angelina Jolie si è allenata con le forze speciali."},
  "Super Mario Bros il film": {desc:"I fratelli Mario e Luigi vengono catapultati in una dimensione parallela dominata da funghi e creature evolute dai dinosauri.", cur:"Bob Hoskins e John Leguizamo hanno ammesso di essersi ubriacati sul set per sopportare le riprese. Un classico del cinema trash."},
  "Super Mario Bros (2023)": {desc:"Il famoso idraulico italiano viene catapultato nel Regno dei Funghi per salvare la principessa Peach da Bowser e il suo esercito.", cur:"Ha incassato oltre 1,3 miliardi di dollari — il film d'animazione videoludico più redditizio della storia."},
  "Wing commander": {desc:"Piloti spaziali umani combattono contro i Kilrathi, una feroce razza aliena felina, in una guerra galattica per la sopravvivenza.", cur:"Uno dei primissimi film da videogioco. Il regista Chris Roberts era il creatore del gioco originale."},
  "Warcraft - l'inizio": {desc:"Gli umani di Azeroth affrontano i guerrieri Orchi che cercano un nuovo mondo attraverso un portale magico.", cur:"Il film ha incassato il 90% dei suoi proventi in Cina. In Occidente fu un flop, in Asia un successo clamoroso."},
  "Un film Minecraft": {desc:"Quattro avventurieri vengono catapultati nel mondo cubico di Minecraft e devono trovare il modo di tornare a casa.", cur:"Jack Black interpreta Steve. Il film è stato accolto con entusiasmo dai bambini e con nostalgia dagli adulti cresciuti col gioco."},
  "Uncharted": {desc:"Nathan Drake, giovane barman, viene reclutato dal cacciatore di tesori Sully per trovare un tesoro perduto dei Magellano.", cur:"Tom Holland ha impiegato 3 anni di allenamento intensivo per prepararsi alle scene d'azione del film."},
  "Tomb raider (2018)": {desc:"Una giovane Lara Croft cerca il padre scomparso su un'isola misteriosa dove esiste una tomba di un'imperatrice giapponese.", cur:"Alicia Vikander si è allenata per 15 mesi. Ha vinto un Oscar per The Danish Girl lo stesso anno in cui fu scelta per il ruolo."},
  "Tekken": {desc:"Jin Kazama partecipa al torneo di arti marziali Iron Fist per vendicarsi di Kazuya Mishima, potente signore della guerra.", cur:"Il film fu prodotto principalmente per il mercato asiatico. La coreografia dei combattimenti è considerata sorprendentemente fedele al gioco."},
  "Super Mario Galaxy": {desc:"Mario affronta Bowser nello spazio per salvare la principessa Peach in un'avventura cosmica tra galassie e pianeti.", cur:"Film d'animazione basato sull'omonimo videogioco Nintendo. Uscì in Giappone prima che nel resto del mondo."},
  "Street fighter: sfida finale": {desc:"Il colonnello Guile guida una coalizione di guerrieri contro il dittatore M. Bison che tiene in ostaggio un'intera città.", cur:"Raul Julia, gravemente malato di cancro, recitò come M. Bison come regalo ai suoi figli fan del gioco. Morì prima dell'uscita."},
  "Street fighter - la leggenda": {desc:"Chun-Li lascia la sua vita di lusso per diventare una guerriera e vendicare suo padre rapito dal criminale Bison.", cur:"Kristin Kreuk (Smallville) interpreta Chun-Li. Il film cercò un approccio più realistico rispetto al film del 1994."},
  "Silent hill": {desc:"Una madre cerca la figlia scomparsa in una città avvolta da nebbia soprannaturale, abitata da creature mostruose.", cur:"Considerato l'adattamento di videogioco horror più fedele mai realizzato. L'atmosfera è praticamente identica al gioco."},
  "Silent hill reveletions": {desc:"Heather Mason scopre di essere la figlia perduta di Silent Hill e deve tornare nella città maledetta per salvare suo padre.", cur:"Sean Bean — famoso per morire in ogni film — sopravvive in questo. I fan notarono la cosa con entusiasmo."},
  "Resident Evil: welcome to Racoon city": {desc:"Un reboot fedele al videogioco originale: due storie parallele nella notte in cui Raccoon City viene devastata dagli zombie.", cur:"Questo film ignora completamente la saga con Milla Jovovich e torna alle radici dei primi due videogiochi."},
  "Rampage: furia animale": {desc:"Il primatologo Davis Okoye deve fermare tre animali mutati — un gorilla, un lupo e un coccodrillo — che devastano Chicago.", cur:"Dwayne Johnson ha passato settimane con primatologhi veri. Il gorilla albino George è basato su un gorilla reale dello zoo di Barcellona."},
  "Resident evil: vendetta": {desc:"Leon S. Kennedy e Chris Redfield affrontano un nuovo focolaio di virus in questo film d'animazione della saga.", cur:"Film CG prodotto direttamente da Capcom con il massimo della fedeltà ai personaggi dei videogiochi."},
  "Resident evil: The final chapter": {desc:"Alice torna ad Hive per trovare l'antidoto che potrebbe salvare l'umanità dal virus T in questo capitolo finale.", cur:"Milla Jovovich e la sua controfigura rimasero entrambe ferite durante le riprese delle scene d'azione più rischiose."},
  "Resident evil: damnation": {desc:"Leon S. Kennedy si infiltra in una nazione dell'Est Europa in piena guerra civile dove vengono usate creature biologiche come armi.", cur:"Film CG ufficiale Capcom che espande la storia tra Resident Evil 5 e 6. Realismo tecnico straordinario per l'epoca."},
  "Resident evil: retribution": {desc:"Alice combatte in una gigantesca struttura di addestramento sottomarina dell'Umbrella Corporation per sopravvivere.", cur:"Il film include cloni di personaggi già morti nelle puntate precedenti — un espediente narrativo creativo."},
  "Resident evil: afterlife": {desc:"Alice cerca la mitica Arcadia mentre i sopravvissuti a Los Angeles combattono contro orde di non-morti.", cur:"Primo film della saga girato in 3D. Paul W.S. Anderson è tornato alla regia dopo i primi due capitoli."},
  "Resident evil: degeneration": {desc:"Leon S. Kennedy e Claire Redfield affrontano un nuovo focolaio di virus T in un aeroporto americano.", cur:"Primo film CG ufficiale della saga Resident Evil, direttamente prodotto da Capcom con i modelli del videogioco."},
  "Resident evil: extinction": {desc:"Alice e i sopravvissuti attraversano il Nevada desertificato mentre l'Umbrella Corporation trama nell'ombra.", cur:"Le riprese nel deserto del Nevada furono interrotte più volte per il caldo estremo. Alcune scene furono girate di notte."},
  "Resident evil: apocalypse": {desc:"Alice e una squadra di sopravvissuti devono fuggire da Raccoon City prima che venga bombardata per contenere il virus.", cur:"Sienna Guillory fu scelta per interpretare Jill Valentine dopo che i fan la indicarono come la scelta perfetta online."},
  "Resident evil": {desc:"Un'agente speciale e soldati d'elite affrontano i sopravvissuti mutanti di un incidente biologico in un laboratorio sotterraneo.", cur:"Milla Jovovich divenne un'icona grazie a questo film. Paul W.S. Anderson, il regista, l'ha poi sposata."},
  "Ratchet & Clank": {desc:"Un giovane meccanico alieno e un piccolo robot difendono la galassia dai piani di un villain che distrugge pianeti interi.", cur:"Film d'animazione in contemporanea con il remake del gioco PS4. Visivamente spettacolare grazie agli studi Rainmaker."},
  "Prince of Persia - le sabbie del tempo": {desc:"Il principe Dastan ottiene un pugnale magico che permette di tornare indietro nel tempo e deve impedire che cada nelle mani sbagliate.", cur:"Jake Gyllenhaal si è allenato 3 mesi per il ruolo. La Disney aveva scommesso molto su questo film come nuovo franchise."},
  "Pokemon - detective Pikachu": {desc:"Un ragazzo cerca suo padre scomparso aiutato da un Pikachu parlante detective in una città dove umani e Pokémon convivono.", cur:"Ryan Reynolds ha prestato la voce a Pikachu. Il film ha convinto anche i non-fan grazie all'approccio poliziesco."},
  "Need for speed": {desc:"Un pilota di corse viene incastrato per omicidio e, una volta uscito di prigione, organizza una gara illegale per vendicarsi.", cur:"Aaron Paul (Breaking Bad) guida le auto da solo senza stuntman. Tutte le acrobazie con le auto sono reali, senza CGI."},
  "Mortal kombat (2021)": {desc:"Un lottatore MMA scopre di essere un campione prescelto per difendere la Terra nel torneo Mortal Kombat.", cur:"Il film mostra finalmente la brutalità del videogioco originale con violenza esplicita. I fan l'hanno molto apprezzato."},
  "Monster hunter": {desc:"Un'unità militare viene trasportata in un mondo alternativo dove mostri giganteschi dominano il paesaggio.", cur:"Milla Jovovich e Paul W.S. Anderson — marito e moglie — lavorano di nuovo insieme. Girato in Namibia e Sudafrica."},
  "Mortal kombat (1995)": {desc:"Tre guerrieri terrestri partecipano al torneo Mortal Kombat per salvare la Terra dal maligno regno di Outworld.", cur:"La colonna sonora elettronica è diventata un classico degli anni '90. 'Mortal Kombat!' è uno dei cori più iconici del cinema."},
  "Mortal kombat - distruzione totale": {desc:"I guerrieri della Terra devono affrontare un'invasione di Outworld dopo la vittoria nel primo torneo.", cur:"Il film fu girato in 6 settimane con budget ridotto dopo il successo del primo. La qualità si vede nella quantità."},
  "Max Payne": {desc:"Un detective della narcotici cerca i responsabili dell'omicidio di sua moglie in una New York invernale e oscura.", cur:"Mark Wahlberg si è preparato al ruolo studiando noir degli anni '40. Il videogioco originale era ispirato al cinema di John Woo."},
  "In the name of the king": {desc:"Un semplice contadino di nome Farmer deve salvare il suo regno dal mago Gallian e dall'orda di mostri Krugs.", cur:"Diretto da Uwe Boll con Jason Statham e Ray Liotta. Il regista è famoso per finanziare i film con scappatoie fiscali tedesche."},
  "House of the dead": {desc:"Studenti intrappolati su un'isola durante un rave devono sopravvivere a un'invasione improvvisa di zombie.", cur:"Uwe Boll usa sequenze del videogioco arcade originale come transizioni tra le scene d'azione — una scelta controversa."},
  "Hitman - l'assassino": {desc:"L'Agente 47, un assassino geneticamente modificato e addestrato, viene tradito dall'organizzazione per cui lavora.", cur:"Timothy Olyphant è L'Agente 47. Il film rimase molto fedele all'estetica del videogioco — codice a barre sulla nuca incluso."},
  "Hitman agente 47": {desc:"Un reboot con il leggendario assassino geneticamente potenziato che scopre la verità sulle sue origini.", cur:"Rupert Friend ha rasato la testa completamente per il ruolo. Il film ignorò il precedente con Olyphant."},
  "Five nights at Freddy's": {desc:"Mike Schmidt, una guardia notturna in una pizzeria con animatroni robotici, scopre i terribili segreti nascosti nel locale.", cur:"Scott Cawthon, creatore del gioco, appare nel film come cameo. Il film era molto atteso dai fan del franchise horror."},
  "Five nights at Freddy's 2": {desc:"Il sequel esplora i segreti ancora più oscuri della Freddy Fazbear's Pizza e le origini degli animatroni assassini.", cur:"Il successo del primo film ha accelerato la produzione del sequel. I fan hanno analizzato ogni frame per trovare Easter egg."},
  "Final fantasy": {desc:"In un futuro post-apocalittico, la dottoressa Aki Ross cerca le otto anime per fermare gli Phantomi che succhiano le energie vitali.", cur:"Fu il primo film con personaggi umani interamente in CGI fotorealistico. La regia di Hironobu Sakaguchi, creatore del gioco."},
  "Final fantasy VII Advent children": {desc:"Cloud Strife affronta i tre discendenti di Sephiroth che cercano di risvegliare il loro padre spirituale per distruggere il mondo.", cur:"Film prodotto direttamente da Square Enix con la stessa qualità grafica del videogioco. I fan lo considerano canonico."},
  "Far cry": {desc:"Un ex militare indaga su esperimenti genetici su un'isola tropicale che trasformano prigionieri in super soldati.", cur:"Uwe Boll ancora lui. Til Schweiger è il protagonista. Il film ignora quasi completamente la storia del videogioco."},
  "Doom": {desc:"Una squadra di marines viene inviata su Marte per affrontare creature mutanti generate da esperimenti genetici in un laboratorio.", cur:"Dwayne Johnson e Karl Urban insieme. La scena in prima persona è un omaggio diretto al punto di vista del videogioco."},
  "Double dragon": {desc:"Due fratelli combattenti cercano le metà di un antico medaglione magico in una Los Angeles post-apocalittica dominata da gang.", cur:"Robert Patrick (T-1000 in Terminator 2) interpreta il villain principale. Uscì nello stesso anno di Street Fighter e Mortal Kombat."},
  "DOA: Dead or alive": {desc:"Le migliori combattenti al mondo vengono invitate su un'isola privata per partecipare al torneo DOA pieno di segreti.", cur:"Tratto dall'omonimo picchiaduro. Diventato un cult per l'estetica e l'ironia involontaria degli anni 2000."},
  "Cacciatori di zombie": {desc:"Un gruppo di sopravvissuti deve fuggire da un'isola infestata di non-morti in questo film collegato ai videogiochi horror.", cur:"Film rarissimo praticamente introvabile oggi. Ha anticipato molti elementi della saga Resident Evil successiva."},
  "Bloodrayne": {desc:"Rayne, una dhampir metà umana metà vampiro, combatte contro il suo padre vampiro nell'Europa del Settecento.", cur:"Kristanna Loken (Terminator 3) interpreta Rayne. Il film ha avuto 3 sequel — caso unico per un film così criticato."},
  "Bloodrayne 2": {desc:"Rayne si sposta nel selvaggio West americano per affrontare un vampiro che sta costruendo un esercito di non-morti.", cur:"Il sequel cambia completamente ambientazione e parte del cast. Diretto ancora da Uwe Boll con budget ridotto."},
  "Borderlands": {desc:"Una cacciatrice di taglie e un gruppo improbabile di alleati cercano un vault alieno leggendario sul pianeta Pandora.", cur:"Cate Blanchett e Kevin Hart insieme — cast stellare per un film che deluse le aspettative di fan e critica."},
  "Alone in the dark": {desc:"Edward Carnby, investigatore del paranormale, affronta antiche creature oscure che vogliono aprire un portale tra i mondi.", cur:"Christian Slater ha accettato il ruolo dopo una serie di flop. Considerato uno dei peggiori film di sempre dai critici."},
  "Alone in the dark 2": {desc:"Un nuovo team di investigatori del paranormale affronta una strega immortale e il suo esercito di zombie in un castello.", cur:"Il sequel non include Christian Slater né Uwe Boll alla regia. Fu diretto da due registi diversi contemporaneamente."},
  "Angry birds": {desc:"Red, un uccello sempre arrabbiato, scopre che i maiali verdi stanno pianificando di rubare le uova dell'isola degli uccelli.", cur:"Il film ha reso giustizia al gioco spiegando finalmente perché gli uccelli e i maiali si odiano così tanto."},
  "Angry birds 2": {desc:"Uccelli e maiali devono allearsi contro un'aquila gigante che minaccia entrambe le loro isole con una macchina del ghiaccio.", cur:"Il sequel è considerato migliore del primo per la chimica tra i personaggi. Silver, la nuova personaggio, è stato molto apprezzato."},
  "Assassin's creed": {desc:"Callum Lynch viene collegato tramite l'Animus ai ricordi del suo antenato assassino Aguilar nella Spagna del 1492.", cur:"Michael Fassbender ha prodotto il film per avere controllo creativo. La tecnologia dell'Animus è ispirata ai progressi VR reali."},

  // ===== SAGHE =====
  "Star wars": {desc:"Luke Skywalker, un giovane contadino, si unisce alla Ribellione per salvare la principessa Leia e combattere l'Impero Galattico.", cur:"George Lucas ipotecò la casa per finanziarlo. Rifiutato da tutti, fu accettato solo dalla Fox. Ha cambiato il cinema per sempre."},
  "Il Signore degli anelli": {desc:"Frodo Baggins porta l'Unico Anello verso la Terra del Mordor per distruggerlo nel fuoco del Monte Fato.", cur:"Peter Jackson girò tutti e 3 i film contemporaneamente in Nuova Zelanda per 274 giorni consecutivi di riprese."},
  "Lo Hobbit": {desc:"Bilbo Baggins parte per un'avventura con 13 nani e il mago Gandalf per recuperare il tesoro di Erebor dal drago Smaug.", cur:"Peter Jackson trasformò un libro in 3 film da quasi 3 ore ciascuno. I fan sono ancora divisi sulla scelta."},
  "Dune": {desc:"Paul Atreides, figlio di un nobile, viene esiliato sul pianeta desertico Arrakis, unica fonte di una spezia preziosissima.", cur:"Denis Villeneuve ha aspettato anni per ottenere i diritti. Timothée Chalamet e Zendaya erano la sua prima scelta assoluta."},
  "Harry Potter": {desc:"Il giovane Harry scopre di essere un mago e frequenta la scuola di magia Hogwarts mentre affronta il suo destino contro Voldemort.", cur:"J.K. Rowling ha rifiutato Hollywood per anni prima di accettare. Daniel Radcliffe aveva 11 anni nel primo film."},
  "Twilight": {desc:"Bella Swan si trasferisce in Oregon e si innamora di Edward Cullen, un vampiro centenario che frequenta ancora il liceo.", cur:"Robert Pattinson ha ammesso di aver odiato i libri. Kristen Stewart ha detto la stessa cosa in un'intervista."},
  "Indiana Jones": {desc:"Il professor Henry Jones Jr., archaeologo e avventuriero, gira il mondo alla ricerca di antichi manufatti combattendo contro le forze del male.", cur:"Harrison Ford si offrì spontaneamente per il ruolo. La scena della pistola contro il lottatore di spada fu improvvisata."},
  "Monsterverse - Godzilla e Kong": {desc:"I titani preistorici Godzilla e King Kong si scontrano mentre l'umanità cerca di capire il loro posto nel mondo naturale.", cur:"Godzilla è il personaggio cinematografico giapponese più longevo della storia — dal 1954 ad oggi senza interruzioni."},
  "Transformers": {desc:"Gli Autobot alleati degli umani combattono contro i Decepticon per il controllo di AllSpark, la fonte di vita cybertroniana.", cur:"Michael Bay ha usato vere basi militari americane per girare. Il Pentagono ha collaborato attivamente alla produzione."},
  "Riddick": {desc:"Il criminale Richard Riddick sopravvive su pianeti ostili usando la sua visione notturna modificata mentre è braccato da cacciatori.", cur:"Vin Diesel ha finanziato di tasca propria il terzo capitolo. Ha ceduto i diritti di Fast & Furious per ottenere il budget."},
  "Hostel": {desc:"Turisti americani in Europa vengono attirati in una rete criminale che vende l'accesso a vittime umane ai sadici più ricchi.", cur:"Prodotto da Quentin Tarantino. Ha inventato il genere 'torture porn'. Incasso: 80 milioni contro un budget di 4 milioni."},
  "Agente 007 - James Bond": {desc:"L'agente segreto britannico James Bond affronta villain globali con gadget tecnologici, automobili da sogno e fascino irresistibile.", cur:"Sean Connery fu scelto dopo che Cary Grant rifiutò. Roger Moore è l'attore ad aver interpretato Bond più volte — 7 film."},
  "Austin Powers": {desc:"Il super-spy degli anni '60 Austin Powers viene scongelato negli anni '90 per fermare il piano di dominio mondiale del suo arcinemico.", cur:"Mike Myers ha scritto il personaggio pensando ai film di Bond anni '60. Il budget era minuscolo — il successo fu inatteso."},
  "Una pallottola spuntata": {desc:"Il detective Frank Drebin, completamente incompetente ma sincero, indaga su crimini in modo totalmente demenziale e inarrestabile.", cur:"Leslie Nielsen era considerato un attore serio prima di Airplane! (1980). Ha reinventato completamente la sua carriera."},
  "Alien": {desc:"L'equipaggio del cargo Nostromo risponde a un segnale su un pianeta e porta a bordo qualcosa di assolutamente letale.", cur:"Ridley Scott non disse agli attori cosa sarebbe uscito dal petto di Kane. Le reazioni di orrore sono autentiche."},
  "Predator": {desc:"Una squadra d'elite guidata dal Maggiore Dutch viene decimata nella giungla da un cacciatore alieno invisibile con tecnologia avanzata.", cur:"Arnold Schwarzenegger e Carl Weathers si stringono la mano all'inizio — la stretta è considerata la più iconica del cinema action."},
  "Beverly hills cop": {desc:"Axel Foley, un detective di Detroit dal metodo non ortodosso, indaga a Beverly Hills sull'omicidio del suo migliore amico.", cur:"Il ruolo era scritto per Sylvester Stallone. Eddie Murphy lo trasformò in commedia pura — una delle migliori decisioni di casting."},
  "Ritorno al futuro": {desc:"Marty McFly viene accidentalmente trasportato nel 1955 con la DeLorean di Doc Brown e deve trovare il modo di tornare al 1985.", cur:"Eric Stoltz fu il Marty originale per 6 settimane di riprese. Fu sostituito da Michael J. Fox prima del completamento."},
  "Hunger games": {desc:"Katniss Everdeen si offre volontaria al posto della sorella per partecipare agli Hunger Games, dove i tributi si uccidono per la tv.", cur:"Jennifer Lawrence era la prima scelta assoluta di Suzanne Collins. Ha imparato a tirare con l'arco per il ruolo."},
  "Matrix": {desc:"Neo scopre che la realtà che conosce è una simulazione informatica e si unisce alla resistenza umana contro le macchine.", cur:"Will Smith rifiutò il ruolo. Keanu Reeves donò una parte del suo compenso al reparto effetti speciali. Il bullet-time rivoluzionò il cinema."},
  "Rambo": {desc:"John Rambo, reduce del Vietnam, viene perseguitato dalla polizia di una piccola città e desencadena la sua training militare.", cur:"Sylvester Stallone ha scritto la sceneggiatura. Il finale originale prevedeva la morte di Rambo — i test con il pubblico lo salvarono."},
  "Pirati dei caraibi": {desc:"Il pirata Jack Sparrow si allea con il fabbro Will Turner per salvare Elizabeth e recuperare la sua nave, la Perla Nera.", cur:"Johnny Depp si ispirò a Keith Richards dei Rolling Stones per il personaggio. Il suo agente pensò che stesse sabotando la carriera."},
  "Scream": {desc:"Una adolescente viene terrorizzata da un killer mascherato che chiama le vittime prima di attaccarle con domande sui film horror.", cur:"Wes Craven ha reinventato il genere horror con l'auto-ireferenzialità. Drew Barrymore accettò il ruolo principale ma poi chiese di morire subito."},
  "Jurassic park": {desc:"Un parco a tema con dinosauri clonati dal DNA va fuori controllo e i visitatori devono sopravvivere alle creature preistoriche.", cur:"Steven Spielberg usò animatroni reali e solo 15 minuti di CGI totali. Il ruggito del T-Rex è un suono di elefante rallentato."},
  "Terminator": {desc:"Un robot assassino inviato dal futuro cerca Sarah Connor, la madre del futuro leader della resistenza umana contro le macchine.", cur:"Arnold Schwarzenegger voleva interpretare Kyle Reese. James Cameron lo convinse a fare il villain — scelta leggendaria."},
  "Mission impossible": {desc:"L'agente Ethan Hunt, incastrato per tradimento, deve trovare il topo all'interno dell'IMF per dimostrare la sua innocenza.", cur:"Tom Cruise ha insistito per fare tutte le proprie acrobazie. La scena nella CIA appesa al soffitto fu girata con lui per davvero."},
  "Scuola di polizia": {desc:"Una nuova legge permette a chiunque di candidarsi come poliziotto, creando un gruppo di reclute completamente impreparate.", cur:"Ha generato 7 film, una serie animata e una live-action. Bubba Smith (Hightower) era un vero giocatore di football NFL."},
  "Nightmare": {desc:"Freddy Krueger, un assassino con artigli di coltelli, attacca i teenager nel loro sonno, uccidendoli nella realtà.", cur:"Wes Craven si ispirò a notizie reali di giovani asiatici morti nel sonno per motivi inspiegabili. Johnny Depp esordisce in questo film."},
  "Non aprite quella porta": {desc:"Un gruppo di amici si imbatte nella famiglia cannibale di Leatherface in una fattoria del Texas abbandonata.", cur:"Tobe Hooper girò il film in estate in Texas senza aria condizionata. La puzza del set era così forte che i tecnici vomitavano."},
  "Il pianeta delle scimmie": {desc:"Un astronauta atterra su un pianeta dove le scimmie sono la specie dominante e gli umani sono schiavi senza parola.", cur:"Il finale con la Statua della Libertà è uno dei twist più iconici della storia del cinema. Charlton Heston non voleva girarlo."},
  "Saw - l'enigmista": {desc:"Due uomini si svegliano incatenati in una stanza con indizi lasciati da un serial killer che li costringe a giochi mortali.", cur:"Il film fu girato in 18 giorni con soli 1.2 milioni di dollari. Il twist finale è considerato il migliore del cinema horror moderno."},
  "Fast and furious": {desc:"Un agente dell'FBI si infiltra in un gruppo di piloti di corse illegali e si ritrova diviso tra la legge e la lealtà.", cur:"Il primo film era ispirato a un articolo di giornale sulle corse illegali a New York. Paul Walker e Vin Diesel divennero amici veri."},
  "Venerdi 13": {desc:"Un gruppo di giovani conseller riapre il campeggio Crystal Lake, ignaro della leggenda del massacro avvenuto anni prima.", cur:"Jason Voorhees non appare quasi nel film originale — è la madre la killer. Jason con il hockey mask arriva nel terzo capitolo."},
  "Halloween": {desc:"Michael Myers fugge dal manicomio e torna alla sua città natale per terrorizzare i teenager la notte di Halloween.", cur:"Il budget era così ridotto che la maschera del killer è una maschera di William Shatner di Captain Kirk dipinta di bianco."},
  "La bambola assassina": {desc:"Una bambola giocattolo parlante è posseduta dall'anima del serial killer Charles Lee Ray e terrorizza una famiglia.", cur:"Don Mancini ha scritto tutti e 7 i film della saga — un record assoluto nel cinema horror. Chucky ha anche una serie TV."},
  "Fantozzi": {desc:"Il ragioniere Ugo Fantozzi subisce umiliazioni infinite nel lavoro e nella vita quotidiana dell'Italia degli anni '70.", cur:"Paolo Villaggio creò il personaggio per un libro nel 1971. La frase 'Una boiata pazzesca!' è entrata nel lessico italiano comune."},
  "American pie": {desc:"Quattro amici del liceo fanno un patto per perdere la verginità prima del ballo di fine anno con risultati comici e imbarazzanti.", cur:"Il film ha lanciato un genere intero di commedie adolescenziali. Jason Biggs con la torta è uno dei momenti più iconici degli anni '90."},
};


// ===== SCHEDE FILM SBAGLIATI =====
function buildWrongCards2(wrongList) {
  const dl = document.getElementById('disc-list');
  dl.innerHTML = '';
  if (!wrongList.length) {
    dl.innerHTML = '<div style="font-size:.72rem;color:#3a2a5a;padding:8px;">Nessun errore — perfetto!</div>';
    return;
  }
  wrongList.forEach(item => {
    const info = FILM_DB[item.title];
    const d = document.createElement('div');
    d.className = 'disc-item';
    d.innerHTML = `
      <div class="disc-name">${item.title} (${item.year})</div>
      <div class="disc-desc">${info ? info.desc : item.desc}</div>
      ${info ? '<div style="font-size:.6rem;color:#4a3a6a;margin-top:6px;padding-top:6px;border-top:1px solid #1a0840;font-style:italic;">💡 ' + info.cur + '</div>' : ''}
      <div style="font-size:.53rem;color:#5B2D8E;margin-top:5px;letter-spacing:1px;">📍 DISPONIBILE ALLO STAND</div>
    `;
    dl.appendChild(d);
  });
}
</script>
